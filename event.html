<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دليل فعاليات الجامعة الافتراضية | تفاصيل الفعالية</title>
    <link rel="icon" href="assets/img/SVUEG.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      /* custom styles for event detail page */
      .event-detail-card {
        max-width: 1000px;
        margin: 0 auto;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .event-detail-img {
        height: 350px;
        object-fit: cover;
        width: 100%;
      }

      .event-info-row {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin: 20px 0;
        padding: 15px 0;
        border-top: 1px solid #eee;
        border-bottom: 1px solid #eee;
      }

      .event-info-item {
        flex: 1;
        min-width: 150px;
        text-align: center;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 12px;
      }

      .event-info-item i {
        color: var(--accent-color);
        font-size: 1.5rem;
        margin-bottom: 8px;
        display: block;
      }

      .event-description {
        line-height: 1.8;
        color: #555;
      }

      .action-buttons {
        display: flex;
        gap: 15px;
        margin-top: 30px;
        flex-wrap: wrap;
      }

      .btn-outline-gold {
        border: 2px solid var(--accent-color);
        color: var(--accent-color);
        background: transparent;
        padding: 10px 25px;
        border-radius: 30px;
        transition: all 0.3s;
      }

      .btn-outline-gold:hover {
        background: var(--accent-color);
        color: var(--primary-color);
      }

      .related-events-section {
        max-width: 1000px;
        margin: 50px auto 0;
      }

      .related-card {
        transition: transform 0.3s;
        border-radius: 12px;
        overflow: hidden;
      }

      .related-card:hover {
        transform: translateY(-5px);
      }

      .related-img {
        height: 160px;
        object-fit: cover;
        width: 100%;
      }

      /* responsive */
      @media (max-width: 768px) {
        .event-detail-img {
          height: 220px;
        }
        .event-info-item {
          min-width: 120px;
        }
        .event-info-item i {
          font-size: 1.2rem;
        }
        .action-buttons {
          justify-content: center;
        }
      }
    </style>
  </head>

  <body style="padding-top: 80px">
    <header style="position: fixed; z-index: 1000; top: 0; width: 100%">
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand" href="index.html">
            <div
              style="
                width: 70px;
                height: 70px;
                background: white;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <img
                src="assets/img/SVUEG_Logo1.png"
                alt="شعار الجامعة"
                style="width: 50px"
              />
            </div>
          </a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="index.html">الرئيسية</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="events.html">كل الفعاليات</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="about.html">عن الدليل</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="contact.html">اتصل بنا</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- event details will be loaded here by javascript -->
    <main class="container my-5" id="eventDetailContainer"></main>

    <!-- footer -->
    <footer class="footer mt-auto">
      <div class="container">
        <div class="row">
          <div class="col-md-4">
            <img
              src="./assets/img/SVUEG_Logo.png"
              alt="SVUEG_Logo1"
              style="height: 100px; border-radius: 20%"
            />
            <h5>دليل فعاليات الجامعة الافتراضية</h5>
            <p>منصتك الأولى لكل فعاليات الجامعة الافتراضية السورية.</p>
          </div>
          <div class="col-md-4">
            <h5>روابط سريعة</h5>
            <ul class="list-unstyled">
              <li><a href="index.html">الرئيسية</a></li>
              <li><a href="events.html">كل الفعاليات</a></li>
              <li><a href="about.html">عن الدليل</a></li>
              <li><a href="contact.html">اتصل بنا</a></li>
            </ul>
          </div>
          <div class="col-md-4">
            <h5>تابعنا</h5>
            <div class="social-icons">
              <a href="#"><i class="fab fa-facebook-f"></i></a>
              <a href="#"><i class="fab fa-twitter"></i></a>
              <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
          </div>
        </div>
        <div class="footer-bottom text-center mt-4">
          <p>
            جميع الحقوق محفوظة © 2026 - دليل فعاليات الجامعة الافتراضية السورية
          </p>
        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
      // load event details when page ready
      $(document).ready(() => {
        loadEventDetails();
      });
    </script>

    <!-- scroll to top button -->
    <div
      id="backBtn"
      onclick="window.scrollTo(0, 0)"
      style="
        z-index: 100;
        position: fixed;
        bottom: 30px;
        left: 30px;
        width: 50px;
        height: 50px;
        background: #0a3b5a;
        color: white;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 30px;
      "
    >
      ↑
    </div>

    <script>
      // show/hide scroll button
      var btn = document.getElementById("backBtn");

      window.onscroll = function () {
        if (document.documentElement.scrollTop > 300) {
          btn.style.display = "flex";
        } else {
          btn.style.display = "none";
        }
      };
    </script>
  </body>
</html>
